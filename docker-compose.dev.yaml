services:
  db:
    build:
      context: .
      dockerfile: Dockerfile.db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - db_data_dev:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d andmejutt"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
      - node_modules_dev:/app/node_modules
    command: sh -c "npm install --prefer-offline && npm run dev:server"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: app_superuser
      DB_PASSWORD: app_superuser
      DB_NAME: andmejutt
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev-only-key-change-for-production}
      PORT: 31869
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"
    ports:
      - "31869:31869"
    depends_on:
      db:
        condition: service_healthy

  sync-db:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
      - node_modules_dev:/app/node_modules
    command: sh -c "npm install --prefer-offline && while true; do npx tsx backend/scripts/sync-db-resources.ts --skip-connection-errors; sleep 3600; done"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: app_superuser
      DB_PASSWORD: app_superuser
      DB_NAME: andmejutt
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev-only-key-change-for-production}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
      - node_modules_dev:/app/node_modules
    command: sh -c "npm install --prefer-offline && npm run dev -w frontend -- --host"
    environment:
      VITE_API_URL: http://localhost:31869
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  db_data_dev:
  node_modules_dev:
