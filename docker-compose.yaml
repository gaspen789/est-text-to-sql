services:
  db:
    build:
      context: .
      dockerfile: Dockerfile.db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - db_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d andmejutt" ]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: app_superuser
      DB_PASSWORD: app_superuser
      DB_NAME: andmejutt
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?Set ENCRYPTION_KEY in your environment or a .env file}
      PORT: 31869
    depends_on:
      db:
        condition: service_healthy

  sync-db:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: builder
    working_dir: /app
    command: sh -c "while true; do npx tsx backend/scripts/sync-db-resources.ts --skip-connection-errors; sleep 3600; done"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: app_superuser
      DB_PASSWORD: app_superuser
      DB_NAME: andmejutt
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?Set ENCRYPTION_KEY in your environment or a .env file}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ""
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  db_data:
